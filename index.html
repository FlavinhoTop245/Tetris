<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>
    <div class="game-container">
        <header>
            <h1>ANTIGRAVITY <span class="highlight">TETRIS</span></h1>
        </header>

        <div class="main-layout">
            <div class="sidebar left">
                <div class="stat-box hold-box">
                    <h2>HOLD</h2>
                    <canvas id="hold" width="140" height="120"></canvas>
                </div>
                <div class="stat-box">
                    <h2>SCORE</h2>
                    <p id="score">0</p>
                </div>
                <div class="stat-box">
                    <h2>LINES</h2>
                    <p id="lines">0</p>
                </div>
                <button id="settings-btn" class="secondary-btn">AJUSTES</button>
                <div id="action-feed" class="action-feed">
                    <p id="action-text"></p>
                    <p id="b2b-text" class="b2b-badge"></p>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="tetris" width="300" height="600"></canvas>
                <div id="game-over" class="overlay hidden">
                    <div class="overlay-content">
                        <h2 id="end-title">GAME OVER</h2>
                        <p id="end-label">Sua pontuação final:</p>
                        <p id="final-score">0</p>

                        <div id="best-times-container" class="hidden">
                            <h3>MELHORES TEMPOS</h3>
                            <ul id="best-times-list"></ul>
                        </div>

                        <div class="end-actions">
                            <button id="restart-btn">JOGAR NOVAMENTE</button>
                            <button id="menu-btn" class="secondary-btn">MENU PRINCIPAL</button>
                        </div>
                    </div>
                </div>
                <div id="start-screen" class="overlay glass-overlay">
                    <div class="overlay-content mode-menu">
                        <h2 class="menu-title">ESCOLHA O MODO</h2>
                        <div class="mode-selection">
                            <button id="start-standard-btn" class="mode-card">
                                <span class="mode-icon">∞</span>
                                <span class="mode-name">PADRÃO</span>
                                <span class="mode-desc">Jogo infinito com velocidade progressiva</span>
                            </button>
                            <button id="start-40-btn" class="mode-card">
                                <span class="mode-icon">40</span>
                                <span class="mode-name">40 LINHAS</span>
                                <span class="mode-desc">Complete 40 linhas o mais rápido possível</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="countdown" class="overlay hidden">
                    <div class="overlay-content">
                        <h1 id="countdown-number">5</h1>
                    </div>
                </div>
            </div>

            <div class="sidebar right">
                <div class="stat-box next-box">
                    <h2>NEXT</h2>
                    <canvas id="next" width="140" height="430"></canvas>
                </div>
                <div class="stat-box timer-box">
                    <h2>TEMPO</h2>
                    <p id="timer">0:00.00</p>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="overlay hidden">
            <div class="overlay-content settings-wrapper">
                <h2>CONTROLES</h2>
                <div class="keybind-list">
                    <div class="keybind-item">
                        <label>Esquerda</label>
                        <button class="key-config" data-action="moveLeft">SETALEFT</button>
                    </div>
                    <div class="keybind-item">
                        <label>Direita</label>
                        <button class="key-config" data-action="moveRight">SETARIGHT</button>
                    </div>
                    <div class="keybind-item">
                        <label>Girar Horário</label>
                        <button class="key-config" data-action="rotateCW">SETA UP</button>
                    </div>
                    <div class="keybind-item">
                        <label>Girar Anti-horário</label>
                        <button class="key-config" data-action="rotateCCW">Z</button>
                    </div>
                    <div class="keybind-item">
                        <label>Cair Lento</label>
                        <button class="key-config" data-action="drop">SETADOWN</button>
                    </div>
                    <div class="keybind-item">
                        <label>Hard Drop</label>
                        <button class="key-config" data-action="hardDrop">SPACE</button>
                    </div>
                    <div class="keybind-item">
                        <label>Segurar Peça</label>
                        <button class="key-config" data-action="hold">C</button>
                    </div>
                </div>
                <button id="close-settings">VOLTAR</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
